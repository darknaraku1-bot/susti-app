<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTI - Agente Futuro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { neon: '#00ff41', alert: '#ff003c' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap');
        
        :root { --neon-green: #00ff41; --neon-red: #ff003c; }
        
        body {
            font-family: 'Roboto Mono', monospace;
            background: radial-gradient(circle at 50% 50%, #0a1f0a 0%, #000000 70%);
            color: #00ff41;
            overflow: hidden;
        }
        
        .neon-text { text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); }
        .neon-text-red { color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red), 0 0 10px var(--neon-red); }
        
        .neon-card {
            background: rgba(0, 20, 0, 0.85); border: 1px solid #00ff41;
            box-shadow: 0 0 15px #00ff41, inset 0 0 15px rgba(0, 255, 65, 0.3); transition: all 0.3s ease;
        }
        .neon-card:hover { box-shadow: 0 0 30px #00ff41, inset 0 0 30px rgba(0, 255, 65, 0.5); transform: translateY(-4px); }
        
        .neon-card-alert {
            border: 1px solid var(--neon-red); box-shadow: 0 0 15px var(--neon-red), inset 0 0 15px rgba(255, 0, 60, 0.2);
        }
        
        .scanline::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px; pointer-events: none; animation: scan 4s linear infinite;
        }
        
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 400px; } }
        .glitch { animation: glitch 2s infinite; }
        @keyframes glitch {
            0%, 40% { text-shadow: 2px 0 #00ff41, -2px 0 #ff00ff; }
            20% { text-shadow: -2px 0 #00ff41, 2px 0 #ff00ff; }
            100% { text-shadow: 0 0 20px #00ff41; }
        }
        
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.6) translateY(100px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes popToast { from { transform: translateY(30px) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes fadeOutToast { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex">

    <div class="w-72 bg-black/90 border-r border-[#00ff41]/50 flex flex-col scanline">
        <div class="p-6 border-b border-[#00ff41]/30 flex items-center gap-3">
            <div class="w-10 h-10 bg-[#00ff41] text-black rounded-xl flex items-center justify-center text-3xl font-bold neon-text">S</div>
            <div>
                <h1 class="text-4xl font-bold tracking-tighter neon-text glitch">SUSTI</h1>
                <p class="text-xs text-[#00ff41]/70 -mt-1 tracking-[4px]">AGENTE FUTURO</p>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab(0)" id="tab0" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-[#00ff41]/10 transition-all active:scale-95 tab-btn bg-[#00ff41]/10">
                <i class="fa-solid fa-gauge text-xl"></i><span class="font-medium tracking-widest">INICIO</span>
            </button>
            <button onclick="switchTab(1)" id="tab1" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-[#00ff41]/10 transition-all active:scale-95 tab-btn">
                <i class="fa-solid fa-calendar text-xl"></i><span class="font-medium tracking-widest">AGENDA</span>
            </button>
            <button onclick="switchTab(2)" id="tab2" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-[#00ff41]/10 transition-all active:scale-95 tab-btn">
                <i class="fa-solid fa-grid-2 text-xl"></i><span class="font-medium tracking-widest">PROYECTOS</span>
            </button>
            <button onclick="switchTab(3)" id="tab3" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-[#00ff41]/10 transition-all active:scale-95 tab-btn">
                <i class="fa-solid fa-boxes-stacked text-xl"></i><span class="font-medium tracking-widest">INVENTARIO</span>
            </button>
        </nav>

        <div class="p-6 border-t border-[#00ff41]/30">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-[#00ff41]/20 rounded-2xl flex items-center justify-center text-xl">👾</div>
                <div>
                    <p class="text-sm font-medium">NEURON-07</p>
                    <p id="sidebar-date" class="text-xs text-[#00ff41]/60">Corrientes • Cargando...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-black/80 border-b border-[#00ff41]/30 backdrop-blur-xl flex items-center px-8 justify-between">
            <h2 id="page-title" class="text-2xl font-bold neon-text">INICIO</h2>
            <div class="flex items-center gap-6">
                <button onclick="triggerNotifications()" class="relative w-9 h-9 flex items-center justify-center text-2xl hover:scale-110 transition-transform">
                    <i class="fa-solid fa-bell"></i>
                    <span id="notif-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold" style="display: none;">0</span>
                </button>
                <button id="header-action-btn" style="display: none;" class="flex items-center gap-3 bg-[#00ff41] hover:bg-[#00cc33] text-black font-bold px-6 py-2 rounded-3xl transition-all active:scale-95 shadow-[0_0_20px_#00ff41]">
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-auto">
            <div id="tab-content-0" class="tab-content">
                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-12 lg:col-span-4 grid grid-cols-2 gap-6">
                        <div class="neon-card p-6 rounded-3xl"><p class="text-xs tracking-widest opacity-60">EVENTOS HOY</p><p id="today-events-count" class="text-6xl font-bold neon-text">0</p></div>
                        <div class="neon-card p-6 rounded-3xl"><p class="text-xs tracking-widest opacity-60">PROYECTOS ACTIVOS</p><p id="active-projects-count" class="text-6xl font-bold neon-text">0</p></div>
                    </div>
                    <div class="col-span-12 lg:col-span-8 neon-card rounded-3xl p-8">
                        <h3 class="text-xl mb-6 flex items-center gap-3"><i class="fa-solid fa-clock"></i> RECORDATORIOS INMEDIATOS</h3>
                        <div id="quick-reminders" class="space-y-4"></div>
                    </div>
                    <div class="col-span-12 neon-card rounded-3xl p-8">
                        <h3 class="text-xl mb-6 flex items-center gap-3"><i class="fa-solid fa-triangle-exclamation text-red-500"></i> ALERTAS DE SISTEMA (Críticos, Stock 0 & Agenda)</h3>
                        <div id="critical-alerts" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                    </div>
                </div>
            </div>

            <div id="tab-content-1" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="agenda-month-title" class="text-3xl font-bold neon-text">AGENDA</h2>
                </div>
                <div id="event-list" class="space-y-4 max-h-[560px] overflow-auto pr-2"></div>
            </div>

            <div id="tab-content-2" class="tab-content hidden">
                <div class="flex justify-between mb-8">
                    <h2 class="text-3xl font-bold neon-text">GRILLA DE PROYECTOS</h2>
                    <input id="search-proj" onkeyup="filterData('proj')" type="text" placeholder="Buscar proyecto..." class="bg-black border border-[#00ff41]/30 focus:border-[#00ff41] px-6 py-3 rounded-3xl text-sm outline-none w-72">
                </div>
                <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>

            <div id="tab-content-3" class="tab-content hidden">
                <div class="flex justify-between mb-8">
                    <h2 class="text-3xl font-bold neon-text">CONTROL DE INVENTARIO</h2>
                    <input id="search-stock" onkeyup="filterData('stock')" type="text" placeholder="Buscar material..." class="bg-black border border-[#00ff41]/30 focus:border-[#00ff41] px-6 py-3 rounded-3xl text-sm outline-none w-72">
                </div>
                <div id="stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="project-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal neon-card w-full max-w-md rounded-3xl p-10">
            <h3 class="text-2xl mb-8">Nuevo Proyecto</h3>
            <div class="space-y-6">
                <input id="proj-name" type="text" placeholder="Nombre del proyecto" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none">
                <div class="grid grid-cols-3 gap-6">
                    <div><label class="text-xs block mb-2">TOTAL</label><input id="proj-qty" type="number" value="1" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                    <div><label class="text-xs block mb-2">ENTREGAR</label><input id="proj-deliver-qty" type="number" value="1" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                    <div><label class="text-xs block mb-2">FECHA</label><input id="proj-date" type="date" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                </div>
                <div><label class="text-xs block mb-2">ENCARGADO</label><input id="proj-assignee" type="text" placeholder="Nombre" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal('project-modal')" class="flex-1 py-4 border border-[#00ff41]/50 hover:bg-[#00ff41]/10 rounded-3xl transition-all">CANCELAR</button>
                <button onclick="createProject()" class="flex-1 py-4 bg-[#00ff41] text-black font-bold rounded-3xl hover:bg-[#00cc33] transition-all">SUBIR A LA RED</button>
            </div>
        </div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal neon-card w-full max-w-md rounded-3xl p-10">
            <h3 class="text-2xl mb-8">Nuevo Item de Inventario</h3>
            <div class="space-y-6">
                <input id="stock-name" type="text" placeholder="Nombre del material o pieza" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs block mb-2">CANTIDAD INICIAL</label><input id="stock-qty" type="number" value="10" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                    <div><label class="text-xs block mb-2">ENCARGADO / UBICACIÓN</label><input id="stock-assignee" type="text" placeholder="Responsable" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal('stock-modal')" class="flex-1 py-4 border border-[#00ff41]/50 hover:bg-[#00ff41]/10 rounded-3xl transition-all">CANCELAR</button>
                <button onclick="createStock()" class="flex-1 py-4 bg-[#00ff41] text-black font-bold rounded-3xl hover:bg-[#00cc33] transition-all">AGREGAR ITEM</button>
            </div>
        </div>
    </div>

    <div id="event-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal neon-card w-full max-w-lg rounded-3xl p-10">
            <h3 class="text-2xl mb-8">Nuevo Recordatorio</h3>
            <div class="space-y-6">
                <input id="event-title" type="text" placeholder="Título" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs block mb-2">FECHA</label><input id="event-date" type="date" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                    <div><label class="text-xs block mb-2">HORA</label><input id="event-time" type="time" value="10:00" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
                </div>
                <div><label class="text-xs block mb-2">ENCARGADO</label><input id="event-assignee" type="text" placeholder="Nombre" class="w-full bg-black border border-[#00ff41]/50 focus:border-[#00ff41] rounded-2xl px-6 py-4 outline-none"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal('event-modal')" class="flex-1 py-4 border border-[#00ff41]/50 hover:bg-[#00ff41]/10 rounded-3xl transition-all">CANCELAR</button>
                <button onclick="addEvent()" class="flex-1 py-4 bg-[#00ff41] text-black font-bold rounded-3xl hover:bg-[#00cc33] transition-all">GUARDAR EN RED</button>
            </div>
        </div>
    </div>

    <script>
        let events = [];
        let projects = [];
        let inventory = [];

        function getLocalYMD() {
            const now = new Date();
            return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        }

        function updateSystemDate() {
            const now = new Date();
            const dateOpts = { day: '2-digit', month: 'short', year: 'numeric' };
            const monthOpts = { month: 'long', year: 'numeric' };
            
            document.getElementById('sidebar-date').textContent = `Corrientes • ${now.toLocaleDateString('es-ES', dateOpts).toUpperCase()}`;
            document.getElementById('agenda-month-title').textContent = `AGENDA • ${now.toLocaleDateString('es-ES', monthOpts).toUpperCase()}`;
            
            const todayStr = getLocalYMD();
            document.getElementById('proj-date').value = todayStr;
            document.getElementById('event-date').value = todayStr;
        }

        function getPendingEvents() {
            const now = new Date();
            const todayStr = getLocalYMD();
            const currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            
            return events.filter(e => {
                if (e.date < todayStr) return true; // Días pasados
                if (e.date === todayStr && e.time <= currentTime) return true; // Hoy, hora cumplida o pasada
                return false;
            });
        }

        function loadData() {
            const savedEvents = localStorage.getItem('susti_events');
            events = savedEvents ? JSON.parse(savedEvents) : [];

            const savedProjects = localStorage.getItem('susti_projects');
            projects = savedProjects ? JSON.parse(savedProjects) : [];
            
            const savedStock = localStorage.getItem('susti_stock');
            inventory = savedStock ? JSON.parse(savedStock) : [];
        }

        function saveData() {
            localStorage.setItem('susti_events', JSON.stringify(events));
            localStorage.setItem('susti_projects', JSON.stringify(projects));
            localStorage.setItem('susti_stock', JSON.stringify(inventory));
            updateAlertBadge();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-[#00ff41]/10'));
            document.getElementById(`tab${tab}`).classList.add('bg-[#00ff41]/10');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-content-${tab}`).classList.remove('hidden');
            
            const titles = ["INICIO", "AGENDA", "PROYECTOS", "INVENTARIO"];
            document.getElementById('page-title').textContent = titles[tab];
            
            const actionBtn = document.getElementById('header-action-btn');
            if (tab === 0) { actionBtn.style.display = 'none'; renderDashboard(); }
            else { actionBtn.style.display = 'flex'; }
            
            if (tab === 1) { actionBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span>RECORDATORIO</span>'; actionBtn.onclick = () => openModal('event-modal'); renderEvents(); }
            if (tab === 2) { actionBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span>PROYECTO</span>'; actionBtn.onclick = () => openModal('project-modal'); renderProjects(); }
            if (tab === 3) { actionBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span>STOCK</span>'; actionBtn.onclick = () => openModal('stock-modal'); renderStock(); }
        }

        // --- SISTEMA DE NOTIFICACIONES Y ALERTAS ---
        function updateAlertBadge() {
            const criticalProjs = projects.filter(p => p.status === "critical").length;
            const zeroStock = inventory.filter(i => i.qty <= 0).length;
            const pendingEvents = getPendingEvents().length;
            
            const total = criticalProjs + zeroStock + pendingEvents;
            
            const badge = document.getElementById('notif-badge');
            badge.textContent = total;
            badge.style.display = total > 0 ? 'flex' : 'none';
        }

        function triggerNotifications() {
            const criticalProjs = projects.filter(p => p.status === "critical").length;
            const zeroStock = inventory.filter(i => i.qty <= 0).length;
            const pendingEventsCount = getPendingEvents().length;
            
            if (criticalProjs === 0 && zeroStock === 0 && pendingEventsCount === 0) {
                showToast("Sistemas óptimos. Sin alertas pendientes.", "success");
            } else {
                let msg = `⚠️ ALERTAS: `;
                if(zeroStock > 0) msg += `${zeroStock} items sin stock. `;
                if(criticalProjs > 0) msg += `${criticalProjs} proyectos críticos. `;
                if(pendingEventsCount > 0) msg += `${pendingEventsCount} recordatorios vencidos.`;
                showToast(msg, "error");
            }
        }

        // --- RENDERIZADO VISUAL ---
        function renderDashboard() {
            const today = getLocalYMD();
            const todayEvents = events.filter(e => e.date === today);
            
            document.getElementById('today-events-count').textContent = todayEvents.length;
            document.getElementById('active-projects-count').textContent = projects.length;

            const quickHTML = events.slice(0, 4).map(e => `
                <div class="flex justify-between items-center border-l-4 ${e.date === today ? 'border-[#00ff41]' : 'border-gray-600'} pl-4 py-2">
                    <div><div class="font-medium">${e.title}</div><div class="text-xs opacity-60">${e.date} • ${e.time} • ${e.assignee}</div></div>
                    ${e.date === today ? '<div class="text-xs bg-[#00ff41]/10 px-3 py-1 rounded-full">HOY</div>' : ''}
                </div>
            `).join('');
            document.getElementById('quick-reminders').innerHTML = quickHTML || '<p class="opacity-50">Sin recordatorios próximos</p>';

            // Combinar proyectos críticos, stock 0 y eventos pendientes en el dashboard
            const criticalProjs = projects.filter(p => p.status === "critical").map(p => `
                <div class="neon-card-alert p-5 rounded-2xl text-center">
                    <div class="text-xs opacity-60">PROYECTO CRÍTICO - ${p.due}</div>
                    <div class="font-medium text-sm mt-2">${p.name}</div>
                </div>
            `);
            const zeroStock = inventory.filter(i => i.qty <= 0).map(i => `
                <div class="neon-card-alert p-5 rounded-2xl text-center bg-red-900/20">
                    <div class="text-xs text-red-400 font-bold tracking-widest">STOCK AGOTADO</div>
                    <div class="font-medium text-sm mt-2">${i.name}</div>
                </div>
            `);
            const pendingEvts = getPendingEvents().map(e => `
                <div class="neon-card-alert p-5 rounded-2xl text-center">
                    <div class="text-xs text-red-400 font-bold tracking-widest">RECORDATORIO PENDIENTE</div>
                    <div class="font-medium text-sm mt-2">${e.title} - ${e.time}</div>
                </div>
            `);
            
            const alertsHtml = [...zeroStock, ...criticalProjs, ...pendingEvts].join('');
            document.getElementById('critical-alerts').innerHTML = alertsHtml || '<p class="opacity-50 text-sm">Sistemas estabilizados.</p>';
        }

        function renderEvents() {
            const html = events.map(e => `
                <div class="neon-card p-6 rounded-2xl flex gap-6">
                    <div class="flex-1"><div class="font-medium text-lg">${e.title}</div><div class="text-sm mt-2 opacity-80"><i class="fa-solid fa-calendar-day mr-2"></i>${e.date} • ${e.time}</div><div class="text-xs mt-2 text-[#00ff41]"><i class="fa-solid fa-user mr-2"></i>${e.assignee}</div></div>
                    <div class="flex items-center"><button onclick="deleteItem('event', ${e.id})" class="text-xs bg-red-900/50 hover:bg-red-900 px-4 py-3 rounded-xl transition-all"><i class="fa-solid fa-trash"></i></button></div>
                </div>
            `).join('');
            document.getElementById('event-list').innerHTML = html;
        }

        function renderProjects(filtered = projects) {
            const html = filtered.map(p => `
                <div class="neon-card rounded-3xl overflow-hidden ${p.status === 'critical' ? 'neon-card-alert' : ''}">
                    <div class="h-2 ${p.status === 'critical' ? 'bg-red-500' : 'bg-[#00ff41]'}"></div>
                    <div class="p-7">
                        <div class="font-medium text-lg">${p.name}</div>
                        <div class="mt-6 grid grid-cols-2 gap-4">
                            <div><div class="text-xs opacity-60">TOTAL</div><div class="text-4xl font-bold neon-text">${p.qty}</div></div>
                            <div><div class="text-xs opacity-60">FECHA ENTREGA</div><div class="text-xl font-bold neon-text text-[#00ff9f] mt-2">${p.due}</div></div>
                        </div>
                        <div class="mt-6 text-xs flex justify-between items-center">
                            <div><span class="text-[#00ff41] mr-1">👤</span> ${p.assignee}</div>
                            <span onclick="deleteItem('proj', ${p.id})" class="cursor-pointer text-red-400 hover:underline"><i class="fa-solid fa-trash"></i></span>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('projects-grid').innerHTML = html;
        }

        function renderStock(filtered = inventory) {
            const html = filtered.map(i => `
                <div class="neon-card rounded-3xl overflow-hidden ${i.qty <= 0 ? 'neon-card-alert' : ''}">
                    <div class="h-2 ${i.qty <= 0 ? 'bg-red-500' : 'bg-[#00ff41]'}"></div>
                    <div class="p-6">
                        <div class="font-medium text-lg ${i.qty <= 0 ? 'text-red-400' : ''}">${i.name}</div>
                        <div class="mt-6 flex justify-between items-center">
                            <div class="text-xs opacity-60">DISPONIBLE</div>
                            <div class="flex items-center gap-3 bg-black/50 p-1.5 rounded-2xl border ${i.qty <= 0 ? 'border-red-500/50' : 'border-[#00ff41]/30'}">
                                <button onclick="changeStock(${i.id}, -1)" class="w-8 h-8 rounded-xl bg-red-900/60 hover:bg-red-600 text-white flex items-center justify-center transition-all">-</button>
                                <span class="text-2xl font-bold ${i.qty <= 0 ? 'neon-text-red' : 'neon-text'} w-10 text-center">${i.qty}</span>
                                <button onclick="changeStock(${i.id}, 1)" class="w-8 h-8 rounded-xl bg-[#00ff41]/20 hover:bg-[#00ff41] hover:text-black flex items-center justify-center transition-all">+</button>
                            </div>
                        </div>
                        <div class="mt-6 text-xs flex justify-between items-center">
                            <div><span class="text-[#00ff41] mr-1">👤</span> ${i.assignee}</div>
                            <span onclick="deleteItem('stock', ${i.id})" class="cursor-pointer text-red-400 hover:underline"><i class="fa-solid fa-trash"></i></span>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('stock-grid').innerHTML = html;
        }

        // --- LÓGICA DE DATOS ---
        function changeStock(id, delta) {
            const item = inventory.find(i => i.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty < 0) item.qty = 0; // Prevenir negativos
                saveData();
                renderStock();
                
                if (item.qty === 0 && delta < 0) {
                    showToast(`⚠️ ALARMA: Stock de "${item.name}" agotado.`, "error");
                }
            }
        }

        function createProject() {
            const name = document.getElementById('proj-name').value || "Proyecto X";
            projects.unshift({
                id: Date.now(), name, qty: parseInt(document.getElementById('proj-qty').value)||1,
                deliverQty: parseInt(document.getElementById('proj-deliver-qty').value)||1,
                due: document.getElementById('proj-date').value,
                assignee: document.getElementById('proj-assignee').value || "No asignado", status: "active"
            });
            finishAction('project-modal', renderProjects);
        }

        function createStock() {
            const name = document.getElementById('stock-name').value || "Material Nuevo";
            inventory.unshift({
                id: Date.now(), name, qty: parseInt(document.getElementById('stock-qty').value)||0,
                assignee: document.getElementById('stock-assignee').value || "No asignado"
            });
            finishAction('stock-modal', renderStock);
        }

        function addEvent() {
            events.unshift({
                id: Date.now(), title: document.getElementById('event-title').value || "Recordatorio",
                date: document.getElementById('event-date').value, time: document.getElementById('event-time').value,
                assignee: document.getElementById('event-assignee').value || "No asignado"
            });
            finishAction('event-modal', renderEvents);
        }

        function deleteItem(type, id) {
            if (confirm("¿Confirmas la eliminación en la matriz?")) {
                if(type==='proj') { projects = projects.filter(i => i.id !== id); renderProjects(); }
                if(type==='event') { events = events.filter(i => i.id !== id); renderEvents(); }
                if(type==='stock') { inventory = inventory.filter(i => i.id !== id); renderStock(); }
                saveData(); renderDashboard();
            }
        }

        function filterData(type) {
            const term = document.getElementById(`search-${type}`).value.toLowerCase();
            if(type === 'proj') renderProjects(projects.filter(p => p.name.toLowerCase().includes(term)));
            if(type === 'stock') renderStock(inventory.filter(i => i.name.toLowerCase().includes(term)));
        }

        // --- UTILIDADES ---
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        
        function finishAction(modalId, renderFn) {
            saveData(); closeModal(modalId); renderFn(); renderDashboard(); showToast("✅ Red actualizada");
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            const color = type === 'error' ? '#ff003c' : '#00ff41';
            const bg = type === 'error' ? 'rgba(255, 0, 60, 0.15)' : 'rgba(0, 255, 65, 0.15)';
            toast.style.cssText = `position: fixed; bottom: 30px; right: 30px; background: ${bg}; border: 1px solid ${color}; color: ${color}; padding: 16px 28px; border-radius: 9999px; font-size: 13px; font-weight: bold; box-shadow: 0 0 30px ${color}; z-index: 9999; animation: popToast 0.4s ease, fadeOutToast 3s 3.5s forwards;`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 6500);
        }

        // --- INICIALIZACIÓN Y BUCLE DE TIEMPO ---
        window.onload = () => {
            updateSystemDate();
            loadData();
            updateAlertBadge();
            switchTab(0);
            
            // Revisa las alarmas automáticamente cada 60 segundos
            setInterval(() => {
                updateAlertBadge();
                if (document.getElementById('tab-content-0').classList.contains('hidden') === false) {
                    renderDashboard(); // Actualiza el inicio visualmente si estás en esa pestaña
                }
            }, 60000);

            setTimeout(() => showToast("✅ Bienvenido de vuelta. Conexión estable."), 800);
        };
    </script>
</body>
</html>
